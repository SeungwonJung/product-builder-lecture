<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <nav class="top-nav">
    <a href="/classifier.html" class="nav-link">
      🐶🐱 강아지 vs 고양이 판별기
    </a>
  </nav>

  <div class="theme-toggle">
    <button id="theme-btn">Toggle Dark Mode</button>
  </div>
  <h1>Lotto Number Generator</h1>
  <button id="generate-btn">Generate Numbers</button>
  <div id="lotto-numbers"></div>

  <section class="contact-section">
    <h2>제휴 문의</h2>
    <form id="contact-form" action="https://formspree.io/f/xgollyjg" method="POST">
      <input type="text" name="name" placeholder="이름" required />
      <input type="email" name="email" placeholder="이메일" required />
      <textarea name="message" placeholder="문의 내용" rows="4" required></textarea>
      <button type="submit">보내기</button>
    </form>
    <p id="form-success" style="display:none;">문의가 접수되었습니다. 감사합니다!</p>
  </section>

  <section class="disqus-section">
    <h2>댓글</h2>
    <div id="disqus_thread"></div>
    <script>
      (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-xa1wanpqzl.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
      })();
    </script>
    <noscript>댓글을 보려면 JavaScript를 활성화해주세요. <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </section>

  <script defer type="text/javascript" src="/main.js?v=4"></script>
</body>
</html>
