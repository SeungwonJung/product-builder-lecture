<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강아지 vs 고양이 판별기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa, #e8ecf1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .back-link {
      align-self: flex-start;
      margin-bottom: 24px;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }
    .back-link:hover { opacity: 0.7; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #2d2d2d;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 36px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .upload-area {
      width: 100%;
      border: 2px dashed #c9d3e0;
      border-radius: 14px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-area:hover {
      border-color: #667eea;
      background: #f0f2ff;
    }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-text { font-size: 15px; color: #555; }
    .upload-hint { font-size: 12px; color: #aaa; margin-top: 4px; }

    #preview-wrap {
      display: none;
      width: 100%;
      text-align: center;
    }
    #preview {
      max-width: 100%;
      max-height: 260px;
      border-radius: 12px;
      object-fit: contain;
      border: 1px solid #eee;
    }

    #predict-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      cursor: pointer;
      transition: opacity 0.2s;
      display: none;
    }
    #predict-btn:hover { opacity: 0.88; }
    #predict-btn:disabled { opacity: 0.5; cursor: default; }

    #result {
      width: 100%;
      display: none;
    }

    .result-label {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 16px;
      color: #2d2d2d;
    }

    .bar-wrap {
      margin-bottom: 12px;
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #555;
      margin-bottom: 5px;
    }
    .bar-bg {
      background: #eef0f4;
      border-radius: 99px;
      height: 12px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    .bar-fill.dog  { background: linear-gradient(90deg, #f7971e, #ffd200); }
    .bar-fill.cat  { background: linear-gradient(90deg, #667eea, #764ba2); }

    .emoji-result {
      font-size: 52px;
      text-align: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <a href="/" class="back-link">← 메인으로</a>

  <h1>🐶 vs 🐱 판별기</h1>
  <p class="subtitle">사진을 업로드하면 AI가 강아지인지 고양이인지 알려드려요</p>

  <div class="card">
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" accept="image/*" />
      <div class="upload-icon">📸</div>
      <div class="upload-text">이미지를 클릭하거나 드래그해서 업로드</div>
      <div class="upload-hint">JPG, PNG, GIF 등 이미지 파일</div>
    </div>

    <div id="preview-wrap">
      <img id="preview" src="" alt="미리보기" />
    </div>

    <button id="predict-btn">판별 시작</button>

    <div id="result">
      <div class="emoji-result" id="result-emoji"></div>
      <div class="result-label" id="result-label"></div>
      <div id="bars"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/NTdXZ3scu/';
    const EMOJIS = { '강아지': '🐶', 'Dog': '🐶', '고양이': '🐱', 'Cat': '🐱' };
    const BAR_CLASS = { '강아지': 'dog', 'Dog': 'dog', '고양이': 'cat', 'Cat': 'cat' };

    let model = null;
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const previewWrap = document.getElementById('preview-wrap');
    const predictBtn = document.getElementById('predict-btn');
    const resultDiv = document.getElementById('result');
    const resultEmoji = document.getElementById('result-emoji');
    const resultLabel = document.getElementById('result-label');
    const barsDiv = document.getElementById('bars');

    async function loadModel() {
      model = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
    }
    loadModel();

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        preview.src = ev.target.result;
        previewWrap.style.display = 'block';
        predictBtn.style.display = 'block';
        resultDiv.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    predictBtn.addEventListener('click', async () => {
      if (!model) return;
      predictBtn.disabled = true;
      predictBtn.textContent = '분석 중...';

      const predictions = await model.predict(preview);
      predictions.sort((a, b) => b.probability - a.probability);
      const top = predictions[0];

      const emoji = EMOJIS[top.className] || '🤔';
      resultEmoji.textContent = emoji;
      resultLabel.textContent = `${top.className} (${(top.probability * 100).toFixed(1)}%)`;

      barsDiv.innerHTML = '';
      predictions.forEach(p => {
        const pct = (p.probability * 100).toFixed(1);
        const cls = BAR_CLASS[p.className] || 'dog';
        barsDiv.innerHTML += `
          <div class="bar-wrap">
            <div class="bar-label"><span>${p.className}</span><span>${pct}%</span></div>
            <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
          </div>`;
      });

      resultDiv.style.display = 'block';
      predictBtn.disabled = false;
      predictBtn.textContent = '다시 판별하기';
    });
  </script>
</body>
</html>
